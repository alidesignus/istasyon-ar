<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.13/lottie.min.js"></script>
    <style>
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 999; padding: 20px; background: #28a745; color: white; border-radius: 10px;
        }
    </style>
</head>
<body>
    <button id="start-button">AR DENEYİMİNİ BAŞLAT</button>

    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: false;" embedded vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="istasyon-tabelasi" mindar-image-target="targetIndex: 0">
            <a-plane id="lottie-plane" position="0 0 0" material="transparent: true; opacity: 1"></a-plane>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            // Sistemin varlığını kontrol et ve başlat
            if (sceneEl.systems['mindar-image-system']) {
                sceneEl.systems['mindar-image-system'].start();
                startButton.style.display = 'none';
            } else {
                alert("Sistem henüz hazır değil. Lütfen 3 saniye bekleyip tekrar basın.");
            }
        });

        // Lottie ve Texture İşlemleri (Aynı kalıyor)
        const animation = lottie.loadAnimation({
            container: document.createElement('div'),
            renderer: 'canvas',
            loop: true,
            autoplay: true,
            path: 'animasyon.json' 
        });

        animation.addEventListener('DOMLoaded', function() {
            const canvas = animation.renderer.canvas;
            const mesh = document.querySelector('#lottie-plane').getObject3D('mesh');
            const texture = new THREE.CanvasTexture(canvas);
            function update() { texture.needsUpdate = true; requestAnimationFrame(update); }
            mesh.material.map = texture;
            update();
        });
    </script>
</body>
</html>
