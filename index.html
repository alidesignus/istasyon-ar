<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tez AR Deneyimi - Debug Mode</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.7.13/lottie.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10000; padding: 20px 40px; font-size: 20px;
            background-color: #28a745; color: white; border: none; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <button id="start-button">DENEYİMİ BAŞLAT</button>

    <a-scene 
        id="ar-scene"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiError: no;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="istasyon-tabelasi" mindar-image-target="targetIndex: 0">
            <a-plane id="lottie-plane" position="0 0 0" height="1" width="1" material="transparent: true; opacity: 0"></a-plane>
            <a-text id="tren-bilgi" value="" position="0 -0.7 0.1" color="#FFFFFF" width="2" align="center"></a-text>
        </a-entity>
    </a-scene>

    <script>
        // HATA YAKALAYICI (Telefonda hata olursa alert verir)
        window.onerror = function(msg, url, lineNo) {
            alert('Hata: ' + msg + '\nSatir: ' + lineNo);
            return true;
        };

        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');

        // BAŞLATMA FONKSİYONU
        startButton.addEventListener('click', () => {
            alert("Sistem baslatiliyor, lütfen kamera izni verin.");
            
            // Kamera iznini manuel tetikle
            navigator.mediaDevices.getUserMedia({ video: true })
            .then((stream) => {
                const arSystem = sceneEl.systems['mindar-image-system'];
                if (arSystem) {
                    arSystem.start(); 
                    startButton.style.display = 'none';
                } else {
                    alert("Kritik Hata: AR sistemi yüklenemedi.");
                }
            })
            .catch((err) => {
                alert("Kamera erisim hatasi: " + err.message);
            });
        });

        // 1. Lottie Animasyonu
        const animation = lottie.loadAnimation({
            container: document.createElement('div'),
            renderer: 'canvas',
            loop: true,
            autoplay: true,
            path: 'animasyon.json' 
        });

        animation.addEventListener('DOMLoaded', function() {
            const canvas = animation.renderer.canvas;
            const mesh = document.querySelector('#lottie-plane').getObject3D('mesh');
            const texture = new THREE.CanvasTexture(canvas);
            
            function update() {
                texture.needsUpdate = true;
                requestAnimationFrame(update);
            }
            mesh.material.map = texture;
            mesh.material.opacity = 1;
            update();
        });

        // 2. Canlı Veri (Temsili)
        async function veriyiGuncelle() {
            try {
                const response = await fetch('tren_saatleri.json');
                const data = await response.json();
                const metin = `TREN: ${data.peron1.isim}\nSAAT: ${data.peron1.saat}\nDURUM: ${data.peron1.durum}`;
                document.querySelector('#tren-bilgi').setAttribute('value', metin);
            } catch (e) {
                document.querySelector('#tren-bilgi').setAttribute('value', "ADAPAZARI EKSPRESI\n14:20 - ZAMANINDA");
            }
        }

        document.querySelector('#istasyon-tabelasi').addEventListener("targetFound", () => {
            veriyiGuncelle();
        });
    </script>
</body>
</html>
